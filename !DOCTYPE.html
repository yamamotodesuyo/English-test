<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英単語タイピングクイズ (ダークモード+一覧切替)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        /* クイズと一覧を横並びにするコンテナ */
        .main-layout {
            display: flex;
            gap: 30px;
            max-width: 900px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #333;
            box-sizing: border-box;
            position: relative;
        }
        /* 単語一覧のスタイル */
        .word-list-container {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 350px;
            max-height: 550px;
            overflow-y: auto;
            border: 1px solid #333;
            box-sizing: border-box;
            text-align: left;
            /* 最初は表示状態 */
            display: block; 
        }
        .word-list-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 5px;
            color: #ffffff;
        }
        .word-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #2a2a2a;
            font-size: 14px;
        }
        .word-item .en {
            color: #2ecc71;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
        }
        .word-item .ja {
            color: #b0b0b0;
        }
        .day-header {
            font-size: 14px;
            color: #2980b9;
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 5px;
            background: #252525;
            padding: 3px 8px;
            border-radius: 4px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #ffffff;
        }
        .settings-section {
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
            border: 1px solid #383838;
        }
        .settings-section h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 16px;
            color: #b0b0b0;
        }
        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }
        .checkbox-group label {
            cursor: pointer;
            font-size: 14px;
            color: #e0e0e0;
        }
        .mode-group {
            font-size: 14px;
            color: #e0e0e0;
            margin-bottom: 5px;
        }
        .mode-group label {
            margin-right: 15px;
            cursor: pointer;
        }
        /* 表示切り替え用チェックボックスのスタイル */
        .toggle-group {
            font-size: 14px;
            color: #e0e0e0;
            border-top: 1px solid #383838;
            padding-top: 12px;
            margin-top: 12px;
        }
        .toggle-group label {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            font-weight: bold;
            color: #3498db;
        }
        button {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #3498db;
        }
        .home-btn {
            background-color: #444;
            margin-top: 20px;
            font-size: 14px;
            padding: 8px 15px;
        }
        .home-btn:hover {
            background-color: #555;
        }
        .quiz-section {
            display: none;
        }
        .progress {
            font-size: 14px;
            color: #a0a0a0;
            margin-bottom: 10px;
        }
        .question {
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0;
            color: #ffffff;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            background-color: #2a2a2a;
            color: #ffffff;
            border: 2px solid #444;
            border-radius: 6px;
            box-sizing: border-box;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #2980b9;
        }
        .result-message {
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
            min-height: 54px;
            line-height: 1.5;
        }
        .correct {
            color: #2ecc71;
        }
        .incorrect {
            color: #ff6b6b;
        }
        .incorrect strong {
            color: #ffffff;
            background-color: #332222;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .hint {
            font-size: 14px;
            color: #888888;
            margin-top: 15px;
        }
        .word-list-container::-webkit-scrollbar {
            width: 8px;
        }
        .word-list-container::-webkit-scrollbar-track {
            background: #1e1e1e;
        }
        .word-list-container::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }
        .word-list-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="container">
        <div id="setup-screen">
            <h1>英単語タイピングクイズ</h1>
            
            <div class="settings-section">
                <h3>① 範囲を選択（複数選択可）</h3>
                <div class="checkbox-group">
                    <label><input type="checkbox" class="range-chkbx" value="D5p1" checked onchange="updateWordList()"> Day 5 - p1</label>
                    <label><input type="checkbox" class="range-chkbx" value="D5p2" checked onchange="updateWordList()"> Day 5 - p2</label>
                    <label><input type="checkbox" class="range-chkbx" value="D6p1" checked onchange="updateWordList()"> Day 6 - p1</label>
                    <label><input type="checkbox" class="range-chkbx" value="D6p2" checked onchange="updateWordList()"> Day 6 - p2</label>
                </div>
                
                <h3>② 出題モード</h3>
                <div class="mode-group">
                    <label><input type="radio" name="order-mode" value="sequence" checked> 順番通り</label>
                    <label><input type="radio" name="order-mode" value="random"> ランダム</label>
                </div>

                <div class="toggle-group">
                    <label>
                        <input type="checkbox" id="toggle-list-chkbx" checked onchange="toggleWordListVisibility()"> 
                        &nbsp;右側に単語一覧を表示する
                    </label>
                </div>
            </div>
            
            <button onclick="startQuiz()">クイズを始める</button>
        </div>

        <div id="quiz-screen" class="quiz-section">
            <div class="progress" id="progress-text">0 / 0</div>
            <div class="question" id="question-text">意味</div>
            <input type="text" id="answer-input" autocomplete="off" placeholder="英単語を入力してEnter">
            <div class="result-message" id="result-text"></div>
            <button id="action-btn" onclick="handleNext()">判定 (Enter)</button>
            <button class="home-btn" onclick="goHome()">🏠 設定（ホーム）に戻る</button>
            <div class="hint">※判定後も打てます。もう一度Enterで次へ</div>
        </div>
    </div>

    <div class="word-list-container" id="word-list-box">
        <div class="word-list-title">📖 対象の単語一覧</div>
        <div id="word-list-content">
            </div>
    </div>
</div>

<script>
// 単語データの定義
const wordData = {
    D5p1: [
        { en: "serve", ja: "～を出す" }, { en: "spread", ja: "～を広げる" },
        { en: "guess", ja: "～を推測する" }, { en: "prefer", ja: "～が好きだ" },
        { en: "prove", ja: "～を証明する" }, { en: "separate", ja: "～を分ける" },
        { en: "taste", ja: "～の味がする" }, { en: "attend", ja: "～に出席する" }
    ],
    D5p2: [
        { en: "hide", ja: "～を隠す" }, { en: "discuss", ja: "～を話し合う" },
        { en: "suffer", ja: "苦しむ" }, { en: "struggle", ja: "もがく" },
        { en: "lend", ja: "～を貸す" }, { en: "warn", ja: "～に警告する" },
        { en: "ship", ja: "～を輸送する" }, { en: "examine", ja: "～を調査する" }
    ],
    D6p1: [
        { en: "bear", ja: "～に耐える" }, { en: "cross", ja: "～を横切る" },
        { en: "earn", ja: "を稼ぐ" }, { en: "doubt", ja: "～を疑う" },
        { en: "sort", ja: "～分類する" }, { en: "join", ja: "～に参加する" },
        { en: "fix", ja: "～を修理する" }, { en: "count", ja: "～を勘定に入れる" }
    ],
    D6p2: [
        { en: "disappear", ja: "消える" }, { en: "remove", ja: "～を取り去る" },
        { en: "gather", ja: "集まる" }, { en: "handle", ja: "を扱う" },
        { en: "behave", ja: "振る舞う" }, { en: "direct", ja: "を向ける" },
        { en: "destroy", ja: "～を破壊する" }, { en: "excape", ja: "逃げる" }
    ]
};

const labelMap = {
    D5p1: "Day 5 - p1",
    D5p2: "Day 5 - p2",
    D6p1: "Day 6 - p1",
    D6p2: "Day 6 - p2"
};

let currentQuizList = [];
let currentIndex = 0;
let isAnswered = false;

window.onload = function() {
    updateWordList();
};

// 単語一覧の表示・非表示を切り替える関数
function toggleWordListVisibility() {
    const checkBox = document.getElementById('toggle-list-chkbx');
    const wordListBox = document.getElementById('word-list-box');
    
    if (checkBox.checked) {
        wordListBox.style.display = 'block'; // 表示
    } else {
        wordListBox.style.display = 'none';  // 非表示
    }
}

function updateWordList() {
    const content = document.getElementById('word-list-content');
    content.innerHTML = "";
    
    const checkboxes = document.querySelectorAll('.range-chkbx');
    let hasData = false;

    checkboxes.forEach(cb => {
        if (cb.checked) {
            hasData = true;
            const header = document.createElement('div');
            header.className = 'day-header';
            header.innerText = labelMap[cb.value];
            content.appendChild(header);

            wordData[cb.value].forEach(word => {
                const item = document.createElement('div');
                item.className = 'word-item';
                item.innerHTML = `<span class="en">${word.en}</span><span class="ja">${word.ja}</span>`;
                content.appendChild(item);
            });
        }
    });

    if (!hasData) {
        content.innerHTML = '<div style="color: #888; font-size:14px; text-align:center; margin-top:20px;">範囲が選択されていません</div>';
    }
}

function startQuiz() {
    currentQuizList = [];
    const checkboxes = document.querySelectorAll('.range-chkbx:checked');
    
    checkboxes.forEach(cb => {
        currentQuizList = currentQuizList.concat(wordData[cb.value]);
    });

    if (currentQuizList.length === 0) {
        alert("範囲を1つ以上選択してください！");
        return;
    }

    const isRandom = document.querySelector('input[name="order-mode"]:checked').value === 'random';
    if (isRandom) {
        currentQuizList.sort(() => Math.random() - 0.5);
    }

    currentIndex = 0;
    isAnswered = false;
    
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    
    showQuestion();
}

function showQuestion() {
    isAnswered = false;
    const currentWord = currentQuizList[currentIndex];
    
    document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${currentQuizList.length}`;
    document.getElementById('question-text').innerText = currentWord.ja;
    
    const inputField = document.getElementById('answer-input');
    inputField.value = "";
    inputField.focus();
    
    document.getElementById('result-text').innerHTML = "";
    document.getElementById('action-btn').innerText = "判定 (Enter)";
}

function handleNext() {
    const inputField = document.getElementById('answer-input');
    const resultText = document.getElementById('result-text');
    const actionBtn = document.getElementById('action-btn');
    const currentWord = currentQuizList[currentIndex];

    if (!isAnswered) {
        const userAnswer = inputField.value.trim().toLowerCase();
        const correctAnswer = currentWord.en.toLowerCase();

        if (userAnswer === correctAnswer) {
            resultText.innerHTML = '<span class="correct">⭕ 正解！</span>';
        } else {
            resultText.innerHTML = `<span class="incorrect">❌ 不正解...</span><br><span style="color: #b0b0b0;">正解:</span> <strong>${currentWord.en}</strong>`;
        }

        actionBtn.innerText = "次へ進む (Enter)";
        isAnswered = true;
    } else {
        currentIndex++;
        if (currentIndex < currentQuizList.length) {
            showQuestion();
        } else {
            alert("すべての問題が終了しました！設定画面に戻ります。");
            goHome();
        }
    }
}

function goHome() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('setup-screen').style.display = 'block';
}

window.addEventListener('keydown', function(e) {
    if (document.getElementById('quiz-screen').style.display === 'block') {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleNext();
        }
    }
});
</script>

</body>
</html>
